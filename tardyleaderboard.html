<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tardy Rankings</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 0;
    background: white;
}

.header{
    background: #000;
    color: #ffd800;
    font-size: 24px;
    font-weight: bold;
    padding: 12px;
}

table{
    width: 100%;
    border-collapse: collapse;
}

th{
    background: #ececec;
    text-align: left;
    padding: 8px;
    border: 1px solid #c0c0c0;
    font-weight: normal;
}

td{
    padding: 8px;
    border: 1px solid #c0c0c0;
}

tr:nth-child(even){
    background: #f8f8f8;
}
</style>
</head>
<body>

<div class="header">
    Tardy Rankings
</div>

<table id="leaderboard">
    <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Tardies</th>
    </tr>
</table>

<script>
let people = [
    {name: "Caeden", tardies: 3},
    {name: "RandomTestperson", tardies: 1},
    {name: "testguy", tardies: 2},
    {name: "Tanner", tardies: 3}
];

// Sort highest tardies first
people.sort((a,b) => b.tardies - a.tardies);

const medals = ["🥇","🥈","🥉"];
const table = document.getElementById("leaderboard");

people.forEach((person,index) => {
    let rank = medals[index] || "#" + (index + 1);

    table.innerHTML += `
        <tr>
            <td>${rank}</td>
            <td>${person.name}</td>
            <td>${person.tardies}</td>
        </tr>
    `;
});
</script>

</body>
</html>
