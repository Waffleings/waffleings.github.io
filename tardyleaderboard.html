<!DOCTYPE html>
<html>
<head>
<title>Tardy Leaderboard</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    color:#222;
}

.board{
    max-width:500px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.person{
    font-size:1.3em;
    padding:12px;
    border-bottom:1px solid #ddd;
}

.person:last-child{
    border-bottom:none;
}

.rank{
    display:inline-block;
    width:40px;
}
</style>
</head>
<body>

<div class="board">
    <h1>Tardy Leaderboard</h1>
    <div id="list"></div>
</div>

<script>
let people = [
    {name:"Caeden", tardies:3},
    {name:"Tanner", tardies:3}
];

people.sort((a,b)=>b.tardies-a.tardies);

const medals = ["🥇","🥈","🥉"];
const list = document.getElementById("list");

people.forEach((person,index)=>{
    list.innerHTML += `
        <div class="person">
            <span class="rank">${medals[index] || "#" + (index+1)}</span>
            <strong>${person.name}</strong> - ${person.tardies}
        </div>
    `;
});
</script>

</body>
</html>
