<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tardy Rankings</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 0;
    background: white;
}

table{
    border-collapse: collapse;
    width: 700px;
}

th{
    background: #e6e6e6;
    text-align: left;
    padding: 8px;
    border: 1px solid #bfbfbf;
}

td{
    padding: 8px;
    border: 1px solid #bfbfbf;
}

.rank{
    width: 80px;
}

.name{
    width: 400px;
}

.score{
    width: 120px;
}
</style>
</head>
<body>

<table id="leaderboard">
    <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Tardies</th>
    </tr>
</table>

<script>

let people = [
    {name: "Caeden", tardies: 3},
    {name: "Tanner", tardies: 3}
];

people.sort((a,b) => b.tardies - a.tardies);

const medals = ["🥇","🥈","🥉"];
const table = document.getElementById("leaderboard");

people.forEach((person,index) => {

    let rank = medals[index] || "#" + (index + 1);

    table.innerHTML += `
        <tr>
            <td class="rank">${rank}</td>
            <td class="name">${person.name}</td>
            <td class="score">${person.tardies}</td>
        </tr>
    `;
});

</script>

</body>
</html>
