<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PlusPortals Rankings</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 0;
    background: white;
}

.header{
    background: #000;
    color: #ffd800;
    font-size: 24px;
    font-weight: bold;
    padding: 12px;
}

.boards{
    display: flex;
    gap: 20px;
    padding: 10px;
}

.board{
    flex: 1;
}

.board h2{
    margin: 0 0 10px 0;
    font-size: 20px;
    font-weight: normal;
}

table{
    width: 100%;
    border-collapse: collapse;
}

th{
    background: #ececec;
    text-align: left;
    padding: 8px;
    border: 1px solid #c0c0c0;
    font-weight: normal;
}

td{
    padding: 8px;
    border: 1px solid #c0c0c0;
}

tr:nth-child(even){
    background: #f8f8f8;
}
</style>
</head>
<body>

<div class="header">
    PlusPortals Rankings
</div>

<div class="boards">

    <div class="board">
        <h2>Tardy Rankings</h2>
        <table id="tardyLeaderboard">
            <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Tardies</th>
            </tr>
        </table>
    </div>

    <div class="board">
        <h2>Absence Rankings</h2>
        <table id="absenceLeaderboard">
            <tr>
                <th>Rank</th>
                <th>Name</th>
                <th>Absences</th>
            </tr>
        </table>
    </div>

</div>

<script>
let people = [
    {name: "Aidan", tardies: 54, absences: 55},
    {name: "Bobby", tardies: 24, absences: 23},
    {name: "Dylan", tardies: 6, absences: 67},
    {name: "Caeden", tardies: 3, absences: 3},
    {name: "Tanner", tardies: 3, absences: 0}
];

const medals = ["🥇","🥈","🥉"];

// Tardy leaderboard
let tardyPeople = [...people].sort((a,b) => b.tardies - a.tardies);
const tardyTable = document.getElementById("tardyLeaderboard");

tardyPeople.forEach((person,index) => {
    let rank = medals[index] || "#" + (index + 1);

    tardyTable.innerHTML += `
        <tr>
            <td>${rank}</td>
            <td>${person.name}</td>
            <td>${person.tardies}</td>
        </tr>
    `;
});

// Absence leaderboard
let absencePeople = [...people].sort((a,b) => b.absences - a.absences);
const absenceTable = document.getElementById("absenceLeaderboard");

absencePeople.forEach((person,index) => {
    let rank = medals[index] || "#" + (index + 1);

    absenceTable.innerHTML += `
        <tr>
            <td>${rank}</td>
            <td>${person.name}</td>
            <td>${person.absences}</td>
        </tr>
    `;
});
</script>

</body>
</html>
