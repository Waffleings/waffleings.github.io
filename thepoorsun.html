<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Sun will die in </title>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    text-align:center;
}

.container{
    max-width:900px;
}

h1{
    font-size:48px;
    margin-bottom:30px;
}

#countdown{
    font-size:32px;
    line-height:1.8;
}
</style>
</head>
<body>

<div class="container">
    <h1>The Sun Will Explode In</h1>
    <div id="countdown"></div>
</div>

<script>
function updateCountdown() {

    const now = new Date();

    const currentYear =
        now.getFullYear() +
        (now.getMonth() / 12) +
        (now.getDate() / 365.2425) +
        (now.getHours() / (365.2425 * 24)) +
        (now.getMinutes() / (365.2425 * 24 * 60)) +
        (now.getSeconds() / (365.2425 * 24 * 60 * 60));

    let yearsRemaining = 5000000000 - currentYear;

    const centuries = Math.floor(yearsRemaining / 100);
    yearsRemaining -= centuries * 100;

    const decades = Math.floor(yearsRemaining / 10);
    yearsRemaining -= decades * 10;

    const years = Math.floor(yearsRemaining);
    yearsRemaining -= years;

    const daysFloat = yearsRemaining * 365.2425;
    const days = Math.floor(daysFloat);

    const hoursFloat = (daysFloat - days) * 24;
    const hours = Math.floor(hoursFloat);

    const minutesFloat = (hoursFloat - hours) * 60;
    const minutes = Math.floor(minutesFloat);

    const seconds = Math.floor((minutesFloat - minutes) * 60);

    document.getElementById("countdown").innerHTML = `
        ${centuries.toLocaleString()} Centuries<br>
        ${decades} Decades<br>
        ${years} Years<br>
        ${days} Days<br>
        ${hours} Hours<br>
        ${minutes} Minutes<br>
        ${seconds} Seconds
    `;
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
